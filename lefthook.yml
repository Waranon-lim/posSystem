pre-commit:
  commands:
    format:
      glob: "*.{cpp,h}"
      run: clang-format -i {staged_files} && git add {staged_files}

commit-msg: 
  commands:
    lint-commit-msg:
      run: |
        if [[ ! "$(head -1 {1})" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|revert)(\(.+\))?:.+$ ]]; then
          echo "❌ Error: Commit message must follow Conventional Commits format!"
          echo "Example: 'feat: add login functionality' or 'fix: resolve db crash'"
          exit 1
        fi
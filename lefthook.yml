pre-commit:
  commands:
    clang-format:
      glob: "*.{cpp,h,hpp,c}"
      run: clang-format -i {staged_files} && git add {staged_files}

commit-msg:
  commands:
    conventional-commit:
      run: |
        MSG=$(cat {1})
        PATTERN="^(feat|fix|chore|docs|style|refactor|test|perf|ci|build|revert)(\(.+\))?: .{1,}"
        if ! echo "$MSG" | grep -qE "$PATTERN"; then
          echo ""
          echo "  Invalid commit message: '$MSG'"
          echo ""
          echo "  Format: <type>(<scope>): <description>"
          echo "  Types:  feat | fix | chore | docs | style | refactor | test | perf | ci | build | revert"
          echo "  Example: feat(auth): add login screen"
          echo ""
          exit 1
        fi
